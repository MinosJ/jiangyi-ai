[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "cd backend && python -m venv /opt/venv && . /opt/venv/bin/activate && pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt"
]

[start]
cmd = "cd backend && /opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
